<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Slick Oil Arena — Hoca Paneli</title>
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .wrap { max-width: 1280px; margin: 0 auto; padding: 20px; }
  .topbar { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; margin-bottom: 18px; }
  .topbar h1 { font-size: 34px; margin-right: auto; }
  .topbar h1 .drop { color: var(--gold); }
  .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .controls .seg { display: flex; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
  .controls .seg button { border: 0; border-radius: 0; padding: 10px 18px; }
  .controls .seg button.act { background: var(--slick); color: #06251b; font-weight: 700; }
  .controls input { width: 74px; text-align: center; }

  /* katlanabilir satırlar — stiller style.css → details.sect */
  .sect + .sect { margin-top: 14px; }

  /* satır 1: QR + adres yan yana */
  .qrrow { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
  .qrrow img { border-radius: 12px; background: #fff; padding: 8px; }
  .qrrow .joinbig { font-size: 26px; word-break: break-all; }

  /* satır 2: hikâye + oynanabilir ağ */
  .scenrow .story { border-left: 3px solid var(--gold); padding: 10px 16px; margin-bottom: 14px; background: var(--panel2); border-radius: 0 10px 10px 0; font-size: 17px; }
  .playbar { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; }
  .playbar .readout { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .playbar .readout .k { font-size: 12px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }
  .playbar .readout .v { font-size: 22px; font-weight: 700; }
  .playbar #scenReset { margin-left: auto; }
  .pipectl { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; background: var(--panel2); border: 1px solid var(--line); border-radius: 12px; padding: 10px 14px; }
  .pipectl[hidden] { display: none; }
  .pipectl #scenFlow { font-size: 24px; font-weight: 700; min-width: 54px; text-align: center; }
  .pipectl button { padding: 8px 14px; }
  .pipectl.shake { animation: shake .3s; }
  @keyframes shake { 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

  /* WHY: max-height vermiyoruz — SVG içeriği viewBox oranını koruyarak küçülür ve
     çizim okunmaz hale gelir. Yükseklik, network.js'teki satır aralığı (rowGap) ve
     üst/alt paylarla (padTop/padBot) kontrol edilir. */
  #netScen, #netOpt { max-width: 900px; margin: 0 auto; }

  .bigopt { font-size: 40px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
  #langBtn { font-weight: 700; min-width: 46px; }

  /* satır 3: sıralamalar solda, histogram sağda */
  .boardgrid { display: grid; grid-template-columns: 1.1fr .9fr; gap: 18px; align-items: start; }
  @media (max-width: 980px) { .boardgrid { grid-template-columns: 1fr; } }
  .boardgrid h3 { font-size: 20px; margin-bottom: 8px; }
  .boardgrid .block + .block { margin-top: 22px; }

  .statusline { display: flex; gap: 24px; align-items: baseline; margin-bottom: 14px; }
  .statusline .timer { font-size: 56px; font-family: "IBM Plex Mono", monospace; font-weight: 700; }
  .statusline .timer.low { color: var(--danger); }
  .statusline .phase { font-size: 20px; color: var(--muted); }

  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; color: var(--muted); font-size: 12px; letter-spacing: .1em; text-transform: uppercase; padding: 8px 10px; border-bottom: 1px solid var(--line); }
  td { padding: 9px 10px; border-bottom: 1px solid #1e2733; font-size: 17px; }
  td.mono, th.r, td.r { text-align: right; }
  tr.top1 td { color: var(--gold); font-weight: 700; font-size: 20px; }
  tr.opt td:first-child::after { content: " 🏆"; }
  .count { color: var(--muted); font-size: 13px; }

  #hist { width: 100%; height: auto; }
  .hbar { fill: var(--slick); opacity: .85; }
  .hbar-axis { stroke: var(--line); }
  .hlabel { fill: var(--muted); font: 600 12px "IBM Plex Mono", monospace; }
  .hcount { fill: var(--paper); font: 700 13px "IBM Plex Mono", monospace; }
  .optline { stroke: var(--violet); stroke-width: 3; stroke-dasharray: 6 5; }
  .optlabel { fill: var(--violet); font: 700 14px "IBM Plex Mono", monospace; }

  .revealbox { border-color: var(--violet); }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <h1 class="display">SLICK OIL <span class="drop">ARENA</span> <span class="muted" style="font-size:18px" data-i18n="panel.subtitle"></span></h1>
    <div class="controls">
      <div class="seg" id="problemSeg">
        <button data-p="oil" data-i18n="ctrl.probOil"></button><button data-p="tsp" data-i18n="ctrl.probTsp"></button>
      </div>
      <div class="seg" id="roundSeg">
        <button data-r="1" data-i18n="ctrl.round1"></button><button data-r="2" data-i18n="ctrl.round2"></button><button data-r="3" data-i18n="ctrl.round3"></button>
      </div>
      <label class="muted" data-i18n="ctrl.duration"></label>
      <input type="number" id="durMin" value="5" min="1" max="30">
      <button class="primary" id="btnStart" data-i18n="ctrl.start"></button>
      <button id="btnClose" data-i18n="ctrl.close"></button>
      <button class="gold" id="btnReveal" data-i18n="ctrl.reveal"></button>
      <button id="btnLobby" data-i18n="ctrl.lobby"></button>
      <button class="danger" id="btnWipe" data-i18n="ctrl.wipe"></button>
      <button id="langBtn" type="button">EN</button>
    </div>
  </div>

  <div class="statusline">
    <div class="timer" id="bigTimer">--:--</div>
    <div class="phase" id="phaseTxt"></div>
    <div class="phase" id="scenTxt"></div>
  </div>

  <!-- 1 — QR / öğrenci girişi -->
  <details class="card sect" id="sectQr" open>
    <summary><span data-i18n="sect.qr"></span> <span class="hint" data-i18n="sect.qrHint"></span></summary>
    <div class="sect-body qrrow">
      <img id="qrImg" width="220" height="220" data-i18n-alt="qr.alt" alt="">
      <div>
        <p class="muted" style="margin-bottom:6px" data-i18n="sect.qrLead"></p>
        <p class="mono slick joinbig" id="joinUrl"></p>
      </div>
    </div>
  </details>

  <!-- 2 — senaryo: hikâye + oynanabilir ağ -->
  <details class="card sect" id="sectScen" open>
    <summary><span data-i18n="sect.scen"></span> <span class="hint" id="scenHint"></span></summary>
    <div class="sect-body scenrow">
      <div class="story" id="scenStory"></div>

      <div class="playbar">
        <div class="readout">
          <span class="k" data-i18n="play.delivered"></span><span class="v mono" id="scenDelivered">—</span>
          <span class="k" data-i18n="play.cost"></span><span class="v mono gold" id="scenCost">$0</span>
          <span class="v slick" id="scenStatus"></span>
        </div>
        <button id="scenReset" data-i18n="play.reset"></button>
      </div>

      <div class="pipectl" id="scenCtl" hidden>
        <span class="display" id="scenPipeTitle"></span>
        <span class="mono gold" id="scenPipeCost"></span>
        <button id="scenZero">0</button>
        <button id="scenMinus">−10</button>
        <span class="mono slick" id="scenFlow">0</span>
        <button id="scenPlus">+10</button>
        <button id="scenMax">MAX</button>
      </div>
      <div class="pipectl" id="scenTspCtl" hidden>
        <button id="scenUndo"></button>
        <button id="scenClear"></button>
      </div>
      <p class="muted" style="font-size:14px;margin:8px 0 12px" data-i18n="play.help"></p>

      <svg class="network" id="netScen"></svg>
    </div>
  </details>

  <!-- 3 — sıralamalar + histogram -->
  <details class="card sect" id="sectBoard" open>
    <summary><span data-i18n="sect.board"></span> <span class="hint" id="subCount"></span></summary>
    <div class="sect-body boardgrid">
      <div>
        <div class="block">
          <h3 class="display" data-i18n="board.live"></h3>
          <table id="lb">
            <thead><tr>
              <th data-i18n="th.rank"></th><th data-i18n="th.name"></th>
              <th class="r" data-i18n="th.cost"></th><th class="r" data-i18n="th.time"></th>
              <th class="r" id="thGap" style="display:none" data-i18n="th.gap"></th>
              <th class="r" id="thPts" style="display:none" data-i18n="th.points"></th>
            </tr></thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="block">
          <h3 class="display"><span data-i18n="board.overall"></span> <span class="count" data-i18n="board.overallHint"></span></h3>
          <p class="count" id="overallLocked" style="margin:8px 0"></p>
          <table id="overall">
            <thead><tr><th data-i18n="th.rank"></th><th data-i18n="th.name"></th><th class="r">T1</th><th class="r">T2</th><th class="r">T3</th><th class="r" data-i18n="th.avgGap"></th></tr></thead>
            <tbody></tbody>
          </table>
          <p class="count" id="overallNote" style="margin-top:8px" data-i18n="board.missingNote"></p>
        </div>
      </div>
      <div>
        <h3 class="display" data-i18n="board.hist"></h3>
        <svg id="hist" viewBox="0 0 560 300"></svg>
      </div>
    </div>
  </details>

  <!-- 4 — optimal açıklaması
       Başlıkta maliyet YAZMAZ: bölüm kapalıyken bile perdede görünürdü.
       Maliyet yalnızca bölüm açıldığında, gövdede belirir. -->
  <details class="card sect revealbox" id="sectOpt" style="display:none">
    <summary class="violet" data-i18n="sect.opt"></summary>
    <div class="sect-body">
      <p class="muted" style="margin-bottom:4px"><span data-i18n="opt.costLabel"></span></p>
      <div class="bigopt violet mono" id="optCostTxt"></div>
      <p class="muted" id="optNote" style="font-size:15px;margin:10px 0 12px"></p>
      <svg class="network" id="netOpt"></svg>
    </div>
  </details>

  <p class="muted" style="margin-top:26px;font-size:13px" data-i18n-html="credit"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="i18n.js"></script>
<script src="scenarios.js"></script>
<script src="network.js"></script>
<script src="tsp-scenarios.js"></script>
<script src="tsp-network.js"></script>
<script src="problems.js"></script>
<script>
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();
const $ = id => document.getElementById(id);

// Aktif problem modülü. Şimdilik sabit "oil"; problem seçici eklenince
// state.problem'dan gelecek (bkz. Aşama C).
let PROBLEM = PROBLEMS.oil;
setProblem(PROBLEM.key);  // i18n resolver'ına aktif problemi bildir

let uiRound = 1;          // panelde seçili tur
let state = null;          // rtdb state
let scoresCache = { r1: {}, r2: {}, r3: {} };
let timerId = null;

// Senaryo satırının yerel deneme durumu (Firebase'e yazılmaz, skorları etkilemez).
// WHY: bu tanımlar refreshAll()'un ilk çağrısından ÖNCE gelmeli — aksi halde
// drawScenario onlara temporal dead zone içinde erişir.
let scenDrawnFor = null;   // senaryo ağı hangi tur için çizildi
const scenSols = {};       // "<problem>_<round>" → çözüm (turlar/problemler arası korunur)
let scenUi = PROBLEM.initialUi();  // deneme alanının edit durumu (oil: {selected})

// Teslim edilmemiş tur bu kadar uzaklık sayılır.
const MISSING_ROUND_GAP = 100;

// Açıklanmış turlar. WHY: uzaklık yüzdesi optimumu ele verir
// (optimum = maliyet / (1 + uzaklık/100)). Bu yüzden bir turun uzaklıkları,
// ancak o tur açıklandıktan sonra perdeye çıkabilir.
// Problem başına ayrı tutulur (oil ve tsp klasmanları bağımsız).
// Bu tanımlar ilk refreshAll() çağrısından ÖNCE gelmeli (temporal dead zone).
let revealedRounds = new Set();
function revealedKey() { return "soa_revealed_" + PROBLEM.key; }
function loadRevealed() { revealedRounds = new Set(JSON.parse(localStorage.getItem(revealedKey()) || "[]")); }
loadRevealed();

// ---- QR + link
const joinUrl = location.href.replace(/hoca\.html.*$/, "");
$("joinUrl").textContent = joinUrl;
$("qrImg").src = "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" + encodeURIComponent(joinUrl);

// ---- katlanabilir satırların açık/kapalı durumu oturumlar arası hatırlanır.
//
// WHY: optimal çözüm satırı BUNUN DIŞINDA. O satır her yüklemede kapalı gelir ve
// asla kendiliğinden açılmaz — projeksiyonda cevabı zamanından önce göstermemek
// için hocanın bilinçli bir tıklaması gerekir (bkz. docs/DECISIONS.md ADR-005).
const SECT_NO_PERSIST = ["sectOpt"];

document.querySelectorAll("details.sect").forEach(d => {
  const redrawOnOpen = () => { if (d.open) redrawNetworks(); };

  if (SECT_NO_PERSIST.includes(d.id)) {
    d.open = false;
    d.addEventListener("toggle", redrawOnOpen);
    return;
  }

  const key = "soa_sect_" + d.id;
  const saved = localStorage.getItem(key);
  if (saved !== null) d.open = saved === "1";
  d.addEventListener("toggle", () => {
    localStorage.setItem(key, d.open ? "1" : "0");
    // WHY: gizliyken çizilen SVG'nin genişliği 0'dır; açılınca doğru
    // geometriyle yeniden çizilmeli (bkz. network.js → netGeometry).
    redrawOnOpen();
  });
});

// ---- problem seçimi (Oil / TSP)
function paintProblemSeg() {
  document.querySelectorAll("#problemSeg button").forEach(b => b.classList.toggle("act", b.dataset.p === PROBLEM.key));
}
// Aktif problemi değiştir (i18n, klasman geçmişi, skor aboneliği hepsi problem başına).
function applyProblem(key) {
  PROBLEM = PROBLEMS[key];
  setProblem(key);
  applyI18n();
  loadRevealed();
  scenDrawnFor = null;    // deneme alanı yeni problem için yeniden çizilsin
  subscribeScores();      // scoresCache'i yeni problemin skorlarıyla doldurur (refreshAll tetikler)
}
function switchProblem(key) {
  if (key === PROBLEM.key) return;
  applyProblem(key);
  paintProblemSeg();
  paintSeg();
  refreshAll();
}
document.querySelectorAll("#problemSeg button").forEach(b => {
  b.addEventListener("click", () => switchProblem(b.dataset.p));
});
paintProblemSeg();

// ---- tur seçimi
document.querySelectorAll("#roundSeg button").forEach(b => {
  b.addEventListener("click", () => { uiRound = +b.dataset.r; paintSeg(); refreshAll(); });
});
function paintSeg() {
  const scen = PROBLEM.scenarios[uiRound];
  document.querySelectorAll("#roundSeg button").forEach(b => b.classList.toggle("act", +b.dataset.r === uiRound));
  $("scenTxt").textContent = t("status.scen", { title: scenTitle(scen), demand: PROBLEM.demand(scen) });
  // oil hint {wells}/{refs} kullanır, tsp hint yalnızca {demand}; ikisi de PROBLEM'den.
  $("scenHint").textContent = t("sect.scenHint", {
    title: scenTitle(scen), wells: scen.wells ? scen.wells.length : "", refs: scen.refs ? scen.refs.length : "", demand: PROBLEM.demand(scen)
  });
  $("durMin").value = PROBLEM.durations[uiRound];
}
paintSeg();
// WHY: senaryo ağı, tablolar ve histogram tamamen yereldir. Firebase'in ilk
// "value" olayını beklemeden çiz — veritabanı yavaşsa ya da erişilemiyorsa
// panel boş açılmasın, hoca yine de ağ üzerinde deneme yapabilsin.
refreshAll();

// ---- kontroller
$("btnStart").onclick = () => {
  const dur = Math.max(1, +$("durMin").value) * 60;
  db.ref("state").set({ problem: PROBLEM.key, round: uiRound, phase: "live", duration: dur, endsAt: Date.now() + dur * 1000 });
};
$("btnClose").onclick = () => db.ref("state").update({ phase: "closed" });
$("btnReveal").onclick = () => db.ref("state").update({ phase: "reveal" });
$("btnLobby").onclick = () => db.ref("state").set({ problem: PROBLEM.key, round: uiRound, phase: "lobby" });

// Skor silme.
//
// WHY: güvenlik kuralları yazma iznini `scores/$round` seviyesinde verir,
// `scores` kökünde DEĞİL. Bu yüzden db.ref("scores").remove() 401 döner ve
// hiçbir şey silinmez. Turlar tek tek silinmeli. Hatalar da yutulmamalı —
// eskiden .catch() yoktu ve başarısız silme sessizce geçiyordu.
$("btnWipe").onclick = () => {
  const counts = [1, 2, 3].map(r => Object.keys(scoresCache["r" + r]).length);
  const answer = prompt(
    t("wipe.prompt", { round: uiRound, c1: counts[0], c2: counts[1], c3: counts[2] }),
    t("wipe.roundWord")
  );
  if (answer == null) return;
  const said = answer.trim().toLowerCase();

  let job = null;
  if (tAll("wipe.allWord").includes(said)) {
    job = Promise.all([1, 2, 3].map(r => db.ref("scores/" + PROBLEM.key + "/r" + r).remove()));
    // Yeni bir ders başlıyor: açıklama geçmişi de sıfırlanmalı, yoksa genel klasman
    // boş skorlarla açık gelir. (Yalnızca aktif problem için.)
    revealedRounds = new Set();
    localStorage.removeItem(revealedKey());
  } else if (tAll("wipe.roundWord").includes(said)) {
    job = db.ref("scores/" + PROBLEM.key + "/r" + uiRound).remove();
  } else return;

  job.catch(err => alert(t("wipe.failed", { error: err && err.message ? err.message : String(err) })));
};

// ---- durum
// Durum henüz gelmediyse "bekleniyor", geldiyse fazın adı.
let stateArrived = false;
function paintPhase() {
  if (!stateArrived) { $("phaseTxt").textContent = t("phase.waiting"); return; }
  $("phaseTxt").textContent = state ? t("phase." + state.phase) : t("phase.none");
}
paintPhase();

// Panel normalde veritabanındaki tura kilitlenir. AMA sayfa ilk yüklendiğinde bunu
// yapmaz: `state` bir önceki dersten kalmış olabilir (ör. Tur 3 / reveal) ve panel
// Tur 3'te açılırdı. İlk anlık görüntüde yalnızca gerçekten CANLI bir tur varsa ona
// geçilir; aksi halde Tur 1'de kalınır.
function shouldAdoptRound(firstSnapshot, snapshotState) {
  if (!snapshotState || !snapshotState.round) return false;
  return !firstSnapshot || snapshotState.phase === "live";
}

db.ref("state").on("value", snap => {
  const firstSnapshot = !stateArrived;
  state = snap.val();
  stateArrived = true;

  // İlk yüklemede canlı bir tur varsa problemini de benimse (bayat state'e karşı
  // shouldAdoptRound ile aynı mantık). Elle problem değiştirmeyi ezmesin diye
  // yalnızca ilk anlık görüntüde.
  if (shouldAdoptRound(firstSnapshot, state) && state.problem && state.problem !== PROBLEM.key) {
    applyProblem(state.problem);
    paintProblemSeg();
  }
  if (shouldAdoptRound(firstSnapshot, state)) uiRound = state.round;
  paintSeg();

  paintPhase();
  syncTimer(); refreshAll();
});

// Skor aboneliği problem başınadır: scores/<problem>/rN. Problem değişince
// eski dinleyiciler kapatılıp yenileri açılır (applyProblem → subscribeScores).
let scoreSubs = [];
function subscribeScores() {
  scoreSubs.forEach(off => off());
  scoreSubs = [];
  scoresCache = { r1: {}, r2: {}, r3: {} };
  ["r1", "r2", "r3"].forEach(k => {
    const ref = db.ref("scores/" + PROBLEM.key + "/" + k);
    const cb = snap => { scoresCache[k] = snap.val() || {}; refreshAll(); };
    ref.on("value", cb);
    scoreSubs.push(() => ref.off("value", cb));
  });
}
subscribeScores();

// ---- her isim için geçerli teslim
//
// WHY: her öğrencinin tur başına TEK teslim hakkı vardır (index.html). Bu yüzden
// aynı isimden birden çok kayıt görürsek — sayfa yenilemesi, localStorage temizliği
// ya da kasıtlı bir deneme — geçerli olan İLK teslimdir. "En ucuzu al" deseydik
// tekrar göndermek ödüllendirilirdi.
function entryPerName(k) {
  const first = {};
  for (const id in scoresCache[k]) {
    const s = scoresCache[k][id];
    if (!s || !s.name || typeof s.cost !== "number") continue;
    const cur = first[s.name];
    if (!cur || s.timeSec < cur.timeSec) first[s.name] = s;
  }
  return Object.values(first).sort((a, b) => a.cost - b.cost || a.timeSec - b.timeSec);
}

// Optimuma uzaklık, yüzde. Düşük olan iyidir; 0 = optimal.
function gapPct(cost, opt) { return 100 * (cost - opt) / opt; }

function markRevealed(round) {
  if (revealedRounds.has(round)) return;
  revealedRounds.add(round);
  localStorage.setItem(revealedKey(), JSON.stringify([...revealedRounds]));
}

function refreshAll() {
  const k = "r" + uiRound;
  const scen = PROBLEM.scenarios[uiRound];
  const rows = entryPerName(k);
  const revealed = state && state.phase === "reveal";
  const opt = PROBLEM.optimalCost(scen);
  if (revealed) markRevealed(uiRound);

  // senaryo satırı — yalnızca tur değişince yeniden çiz.
  // WHY: her skor güncellemesinde yeniden çizmek, hocanın üzerinde çalıştığı
  // ağı ve seçili boruyu sıfırlar.
  if (scenDrawnFor !== scen.key) drawScenario(scen);

  // liderlik tablosu
  $("subCount").textContent = t("board.count", { subs: Object.keys(scoresCache[k]).length, players: rows.length });
  // WHY: uzaklık ve puan, maliyetle birlikte optimumu ele verir. Yalnızca açıklamadan sonra.
  $("thGap").style.display = revealed ? "" : "none";
  $("thPts").style.display = revealed ? "" : "none";
  const tb = $("lb").querySelector("tbody");
  tb.innerHTML = "";
  rows.slice(0, 15).forEach((s, i) => {
    const tr = document.createElement("tr");
    if (i === 0) tr.classList.add("top1");
    if (revealed && Math.abs(s.cost - opt) < 1e-6) tr.classList.add("opt");
    tr.innerHTML = `<td>${i + 1}</td><td>${esc(s.name)}</td>` +
      `<td class="r mono">${PROBLEM.fmtCost(s.cost)}</td>` +
      `<td class="r mono muted">${fmtT(s.timeSec)}</td>` +
      (revealed ? `<td class="r mono slick">${t("gap.value", { gap: gapPct(s.cost, opt).toFixed(1) })}</td>` : "") +
      (revealed ? `<td class="r mono violet">${Math.round(1000 * opt / s.cost)}</td>` : "");
    tb.appendChild(tr);
  });

  // histogram
  drawHist(rows.map(r => r.cost), revealed ? opt : null);

  // Açıklama satırı: "Optimali sınıfa aç"tan sonra GÖRÜNÜR olur ama KAPALI durur.
  // Açmak hocanın tıklamasına kalmıştır; ağ da yalnızca açıkken çizilir.
  $("sectOpt").style.display = revealed ? "" : "none";
  if (revealed) {
    $("optCostTxt").textContent = PROBLEM.fmtCost(opt);
    $("optNote").textContent = scenNote(scen);
    if ($("sectOpt").open) drawOptimal(scen);
  } else {
    $("sectOpt").open = false;
  }

  // genel klasman
  drawOverall();
}

// ---- senaryo satırı: hikâye + hocanın kendi deneyebileceği ağ
// Her turun çözümü ayrı tutulur (problem+tur anahtarıyla), geçişte kaybolmaz.
function solKey(scen) { return PROBLEM.key + "_" + scen.key; }
function solFor(scen) {
  if (!scenSols[solKey(scen)]) scenSols[solKey(scen)] = PROBLEM.emptySolution(scen);
  return scenSols[solKey(scen)];
}

function drawScenario(scen) {
  if (scenDrawnFor !== solKey(scen)) {
    scenDrawnFor = solKey(scen);
    scenUi = PROBLEM.initialUi();
  }
  $("scenStory").innerHTML = `<strong class="display">${scenTitle(scen)}</strong><br>${scenStory(scen)}`;
  paintScenario(scen);
}

function paintScenario(scen) {
  const solc = solFor(scen);
  const ev = PROBLEM.render($("netScen"), scen, solc, scenUi, i => onScenTap(scen, i));
  const seq = PROBLEM.controls.kind === "sequence";
  $("scenDelivered").textContent = `${ev.delivered} / ${ev.demand}` + (seq ? "" : "🛢");
  $("scenCost").textContent = PROBLEM.fmtCost(ev.cost);
  $("scenStatus").textContent = ev.feasible ? t("play.valid") : "";
  if (seq) {
    // TSP: Geri al / Temizle çubuğu
    $("scenCtl").hidden = true;
    $("scenTspCtl").hidden = false;
    $("scenUndo").textContent = t("undo");
    $("scenClear").textContent = t("clear");
    const canEdit = solc.length > 1;
    $("scenUndo").disabled = !canEdit;
    $("scenClear").disabled = !canEdit;
  } else {
    // oil: akış çubuğu (boru seçilince)
    $("scenTspCtl").hidden = true;
    updateScenFlowBar(scen, solc);
  }
}

// oil deneme alanı akış çubuğu
function updateScenFlowBar(scen, solc) {
  $("scenCtl").hidden = scenUi.selected == null;
  if (scenUi.selected != null) {
    const [w, r] = scen.links[scenUi.selected];
    $("scenPipeTitle").textContent = `${t("net.well")} ${scen.wells[w].name} → ${t("net.ref")} ${scen.refs[r].name}`;
    $("scenPipeCost").textContent = "$" + unitCost(scen, scenUi.selected) + t("pipe.perBarrel");
    $("scenFlow").textContent = solc[scenUi.selected];
  }
}

function onScenTap(scen, i) {
  const r = PROBLEM.onTap(scen, solFor(scen), scenUi, i);
  scenSols[solKey(scen)] = r.sol; scenUi = r.ui;
  paintScenario(scen);
}

function scenBump(delta) {
  const scen = PROBLEM.scenarios[uiRound];
  if (scenUi.selected == null) return;
  const flows = solFor(scen);
  if (delta > 0 && headroom(scen, flows, scenUi.selected) < delta) {
    const ctl = $("scenCtl");
    ctl.classList.remove("shake"); void ctl.offsetWidth; ctl.classList.add("shake");
    return;
  }
  flows[scenUi.selected] = Math.max(0, flows[scenUi.selected] + delta);
  paintScenario(scen);
}

$("scenPlus").onclick = () => scenBump(PROBLEM.scenarios[uiRound].step);
$("scenMinus").onclick = () => scenBump(-PROBLEM.scenarios[uiRound].step);
$("scenZero").onclick = () => {
  const scen = PROBLEM.scenarios[uiRound];
  if (scenUi.selected == null) return;
  solFor(scen)[scenUi.selected] = 0;
  paintScenario(scen);
};
$("scenMax").onclick = () => {
  const scen = PROBLEM.scenarios[uiRound];
  if (scenUi.selected == null) return;
  const flows = solFor(scen);
  const h = Math.floor(headroom(scen, flows, scenUi.selected) / scen.step) * scen.step;
  if (h <= 0) { scenBump(scen.step); return; }
  flows[scenUi.selected] += h;
  paintScenario(scen);
};
$("scenReset").onclick = () => {
  const scen = PROBLEM.scenarios[uiRound];
  scenSols[solKey(scen)] = PROBLEM.emptySolution(scen);
  scenUi = PROBLEM.initialUi();
  paintScenario(scen);
};
// TSP deneme alanı: son şehri geri al / turu temizle
$("scenUndo").onclick = () => {
  const scen = PROBLEM.scenarios[uiRound];
  const solc = solFor(scen);
  if (solc.length > 1) { scenSols[solKey(scen)] = solc.slice(0, -1); paintScenario(scen); }
};
$("scenClear").onclick = () => {
  const scen = PROBLEM.scenarios[uiRound];
  scenSols[solKey(scen)] = PROBLEM.emptySolution(scen);
  scenUi = PROBLEM.initialUi();
  paintScenario(scen);
};
// boş alana tıklayınca seçimi bırak (yalnız oil'de anlamlı)
$("netScen").addEventListener("click", e => {
  if (e.target === $("netScen")) { scenUi = PROBLEM.initialUi(); paintScenario(PROBLEM.scenarios[uiRound]); }
});

// ---- optimal ağ (reveal katmanı)
function drawOptimal(scen) {
  PROBLEM.render($("netOpt"), scen, PROBLEM.optimalSolution(scen), PROBLEM.initialUi(), null);
  PROBLEM.decorateOptimal($("netOpt"));
}

// ---- pencere yeniden boyutlanınca / bölüm açılınca ağları yeniden çiz
function redrawNetworks() {
  const scen = PROBLEM.scenarios[uiRound];
  // Çözüm ve seçim korunur; yalnızca yeni genişliğe göre yeniden çizilir.
  if ($("sectScen").open) paintScenario(scen);
  if ($("sectOpt").open && $("sectOpt").style.display !== "none") drawOptimal(scen);
}
let resizeId = null;
window.addEventListener("resize", () => { clearTimeout(resizeId); resizeId = setTimeout(redrawNetworks, 150); });

// Genel klasman: üç turun optimuma uzaklık ORTALAMASI, küçükten büyüğe.
//
// WHY toplam puan değil: puan = 1000·optimal/maliyet, ve turların optimalleri farklı
// ($690 / $920 / $1245). Bu yüzden puanlar farklı ölçeklerde ve toplamak, pahalı
// turlara sessizce daha çok ağırlık verir. Uzaklık yüzdesi ölçeksizdir; ortalaması
// "sınıfın optimuma ne kadar yaklaştığı" sorusunu doğrudan yanıtlar.
//
// Teslim edilmeyen tur MISSING_ROUND_GAP (%100) sayılır — kaçırmak avantaj olmasın.
function drawOverall() {
  const tb = $("overall").querySelector("tbody");
  const allRevealed = [1, 2, 3].every(r => revealedRounds.has(r));

  // WHY: uzaklık optimumu ele verir. Üç tur da açıklanmadan tablo perdeye çıkamaz.
  $("overall").style.display = allRevealed ? "" : "none";
  $("overallNote").style.display = allRevealed ? "" : "none";
  $("overallLocked").style.display = allRevealed ? "none" : "";
  if (!allRevealed) {
    $("overallLocked").textContent = t("board.locked", { done: revealedRounds.size });
    tb.innerHTML = "";
    return;
  }

  const names = new Set();
  const entries = {};   // tur → { isim: teslim }
  [1, 2, 3].forEach(r => {
    entries[r] = {};
    for (const s of entryPerName("r" + r)) { entries[r][s.name] = s; names.add(s.name); }
  });

  const rows = [...names].map(name => {
    const gaps = [1, 2, 3].map(r => {
      const s = entries[r][name];
      return s ? gapPct(s.cost, PROBLEM.optimalCost(PROBLEM.scenarios[r])) : MISSING_ROUND_GAP;
    });
    const played = [1, 2, 3].map(r => !!entries[r][name]);
    return { name, gaps, played, avg: (gaps[0] + gaps[1] + gaps[2]) / 3 };
  }).sort((a, b) => a.avg - b.avg);

  const cell = (gap, played) => played
    ? `<td class="r mono">${t("gap.value", { gap: gap.toFixed(1) })}</td>`
    : `<td class="r mono danger">${t("gap.value", { gap: MISSING_ROUND_GAP })}</td>`;

  tb.innerHTML = "";
  rows.slice(0, 12).forEach((r, i) => {
    const tr = document.createElement("tr");
    if (i === 0) tr.classList.add("top1");
    if (r.avg < 1e-9) tr.classList.add("opt");   // üç turda da optimal
    tr.innerHTML = `<td>${i + 1}</td><td>${esc(r.name)}</td>` +
      cell(r.gaps[0], r.played[0]) + cell(r.gaps[1], r.played[1]) + cell(r.gaps[2], r.played[2]) +
      `<td class="r mono gold">${t("gap.value", { gap: r.avg.toFixed(1) })}</td>`;
    tb.appendChild(tr);
  });
}

// ---- histogram
function drawHist(costs, optCost) {
  const svg = $("hist");
  svg.innerHTML = "";
  const NS = "http://www.w3.org/2000/svg";
  const el = (n, a) => { const e = document.createElementNS(NS, n); for (const q in a) e.setAttribute(q, a[q]); svg.appendChild(e); return e; };
  const W = 560, H = 300, padL = 16, padB = 34, padT = 18;
  el("line", { x1: padL, y1: H - padB, x2: W - 10, y2: H - padB, class: "hbar-axis" });
  if (!costs.length) {
    const label = el("text", { x: W / 2, y: H / 2, class: "hlabel", "text-anchor": "middle" });
    label.textContent = t("hist.empty"); return;
  }
  let lo = Math.min(...costs), hi = Math.max(...costs);
  if (optCost != null) lo = Math.min(lo, optCost);
  if (hi === lo) hi = lo + 1;
  const span = hi - lo, binW = Math.max(10, Math.ceil(span / 9 / 10) * 10);
  const b0 = Math.floor(lo / binW) * binW;
  const nBins = Math.max(1, Math.ceil((hi - b0 + 1) / binW));
  const bins = new Array(nBins).fill(0);
  costs.forEach(c => bins[Math.min(nBins - 1, Math.floor((c - b0) / binW))]++);
  const maxN = Math.max(...bins);
  const bw = (W - padL - 20) / nBins;
  const x = v => padL + (v - b0) / (nBins * binW) * (W - padL - 20);
  bins.forEach((n, i) => {
    if (!n) return;
    const h = (H - padB - padT) * n / maxN;
    el("rect", { x: padL + i * bw + 2, y: H - padB - h, width: bw - 4, height: h, rx: 4, class: "hbar" });
    const count = el("text", { x: padL + i * bw + bw / 2, y: H - padB - h - 6, class: "hcount", "text-anchor": "middle" });
    count.textContent = n;
  });
  for (let i = 0; i <= nBins; i += Math.ceil(nBins / 6)) {
    const tick = el("text", { x: padL + i * bw, y: H - padB + 18, class: "hlabel", "text-anchor": "middle" });
    tick.textContent = PROBLEM.fmtCost(b0 + i * binW);
  }
  if (optCost != null) {
    const ox = x(optCost);
    el("line", { x1: ox, y1: padT - 6, x2: ox, y2: H - padB, class: "optline" });
    const label = el("text", { x: Math.min(ox + 6, W - 120), y: padT + 6, class: "optlabel" });
    label.textContent = t("hist.opt", { cost: PROBLEM.fmtCost(optCost) });
  }
}

// ---- zamanlayıcı
function syncTimer() {
  clearInterval(timerId);
  const el2 = $("bigTimer");
  if (!state || state.phase !== "live" || !state.endsAt) { el2.textContent = "--:--"; el2.classList.remove("low"); return; }
  const tick = () => {
    const left = Math.max(0, Math.round((state.endsAt - Date.now()) / 1000));
    el2.textContent = String(Math.floor(left / 60)).padStart(2, "0") + ":" + String(left % 60).padStart(2, "0");
    el2.classList.toggle("low", left <= 30 && left > 0);
    if (left <= 0) { clearInterval(timerId); db.ref("state").update({ phase: "closed" }); }
  };
  tick(); timerId = setInterval(tick, 500);
}

function esc(s) { return String(s).replace(/[<>&"]/g, c => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;" }[c])); }
function fmtT(sec) { return sec == null ? "—" : sec.toFixed(0) + t("unit.sec"); }

// ---- dil
// applyI18n statik metinleri değiştirir; faz, senaryo, tablolar ve ağ
// etiketleri burada yeniden çizilir.
initLangToggle("langBtn", () => {
  document.title = t("doc.title.host");
  paintSeg();
  paintPhase();
  refreshAll();
  redrawNetworks();
});
document.title = t("doc.title.host");
</script>
